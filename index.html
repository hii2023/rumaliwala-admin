<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Rumaliwala | Rumali & Islamic Accessories</title>
<meta name="description" content="Rumaliwala - Rumali, Namazi, Burkha accessories, caps, masks and gloves. Order on WhatsApp. Ahmedabad." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234a2e20'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23c9a35f' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root {
    --bg:#f5eee2; --surface:#fffaf1; --surface-2:#efe4d3; --ink:#2d2016; --ink-soft:#877360;
    --line:#e8dcc8; --line-dark:#dccbb2; --accent:#4a2e20; --accent-2:#6e4a33; --accent-soft:#efe3d1;
    --gold:#b08d4f; --danger:#a83228; --radius:14px; --radius-lg:20px;
    --shadow:0 2px 10px rgba(60,40,25,.06); --shadow-lg:0 14px 40px rgba(60,40,25,.18); --maxw:1120px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; }
  body { font-family:'IBM Plex Sans','Noto Sans Devanagari','Noto Sans Gujarati',system-ui,sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased; padding-bottom:104px; }
  h1,h2,h3,h4 { font-weight:600; letter-spacing:-0.3px; margin:0; }
  button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  img { max-width:100%; display:block; }
  a { color:inherit; text-decoration:none; }
  svg { display:block; }
  .icon { width:22px; height:22px; }
  input,textarea,select { font-family:inherit; }

  header.top { position:sticky; top:0; z-index:40; background:rgba(246,242,234,.92); backdrop-filter:saturate(180%) blur(12px); border-bottom:1px solid var(--line); }
  .top-inner { max-width:var(--maxw); margin:0 auto; padding:10px 12px; display:flex; align-items:center; gap:10px; }
  .brand { display:flex; align-items:center; gap:9px; cursor:pointer; flex-shrink:0; }
  .brand .mark { width:44px; height:44px; border-radius:50%; background:var(--accent); color:#e9d6b6; display:grid; place-items:center; border:1.5px solid var(--gold); font-family:'Cinzel',serif; font-weight:700; font-size:21px; padding-left:1px; }
  .brand .mark svg { width:22px; height:22px; }
  .brand h1 { font-family:'Cinzel',serif; font-size:19px; line-height:1; letter-spacing:1.5px; color:var(--accent); font-weight:600; }
  .brand p { font-size:8px; margin:4px 0 0; color:var(--gold); letter-spacing:1.8px; text-transform:uppercase; font-weight:600; }
  .search-wrap { flex:1; position:relative; max-width:420px; }
  .search-wrap input { width:100%; padding:10px 12px 10px 38px; border:1px solid var(--line-dark); border-radius:30px; background:var(--surface); font-size:15px; color:var(--ink); outline:none; }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap .si { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--ink-soft); }
  .search-wrap .si svg { width:18px; height:18px; }
  .lang-btn { flex-shrink:0; display:flex; align-items:center; gap:5px; padding:8px 11px; border:1px solid var(--line-dark); border-radius:30px; background:var(--surface); font-size:13px; font-weight:600; color:var(--accent); }
  .lang-btn svg { width:17px; height:17px; }

  main { max-width:var(--maxw); margin:0 auto; padding:14px; }
  .section-head { display:flex; align-items:center; gap:8px; margin:24px 2px 12px; }
  .section-head svg { width:20px; height:20px; color:var(--gold); }
  .section-head h3 { font-size:19px; }

  .hero { position:relative; border-radius:var(--radius-lg); overflow:hidden; background:var(--accent); color:#f4efe4; padding:26px 22px; margin-top:4px; }
  .hero .pattern { position:absolute; inset:0; opacity:.1; background-repeat:repeat; background-size:50px 50px; }
  .hero-content { position:relative; }
  .hero h2 { font-family:'Cinzel',serif; font-size:26px; line-height:1.15; margin:0 0 8px; color:#f3e7d3; letter-spacing:1px; }
  .hero-sub { color:rgba(243,231,211,.82); font-size:14px; margin:0 0 18px; }
  .hero-cta { display:inline-flex; align-items:center; gap:8px; background:#f3e7d3; color:var(--accent); font-weight:600; padding:12px 22px; border-radius:30px; font-size:15px; }
  .hero-cta svg { width:18px; height:18px; }

  .announce { background:var(--accent); color:#eddcbf; font-size:12px; text-align:center; padding:7px 12px; letter-spacing:.3px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .announce svg { width:14px; height:14px; color:var(--gold); }
  .cat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .cat-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; transition:transform .12s,box-shadow .12s,border-color .12s; }
  .cat-card:hover { box-shadow:var(--shadow); }
  .cat-photo { aspect-ratio:1/1; position:relative; background:var(--surface-2); overflow:hidden; }
  .cat-photo img { width:100%; height:100%; object-fit:cover; }
  .cat-photo .ph { position:absolute; inset:0; display:grid; place-items:center; color:var(--accent); }
  .cat-photo .ph svg { width:44px; height:44px; stroke-width:1.4; opacity:.55; }
  .cat-foot { background:var(--surface); text-align:center; padding:11px 6px 12px; }
  .cat-foot .name { font-weight:600; font-size:13px; letter-spacing:.8px; text-transform:uppercase; color:var(--ink); }
  .cat-foot .cnt { font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .cat-card-old { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:15px 6px 11px; text-align:center; transition:transform .12s,box-shadow .12s,border-color .12s; }
  .cat-card:active { transform:scale(.95); }
  .cat-card:hover { box-shadow:var(--shadow); border-color:var(--line-dark); }
  .cat-ic { width:54px; height:54px; margin:0 auto 8px; border-radius:12px; background:var(--accent-soft); color:var(--accent); display:grid; place-items:center; overflow:hidden; }
  .cat-ic svg { width:30px; height:30px; stroke-width:1.6; }
  .cat-ic.has-img { background:none; }
  .cat-ic img { width:100%; height:100%; object-fit:cover; }
  .cat-card .name { font-size:12px; font-weight:500; line-height:1.2; }

  .prod-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .prod-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; position:relative; display:flex; flex-direction:column; transition:box-shadow .15s,border-color .15s; }
  .prod-card:hover { box-shadow:var(--shadow); border-color:var(--line-dark); }
  .prod-thumb { aspect-ratio:1/1; position:relative; cursor:pointer; overflow:hidden; background:var(--surface-2); }
  .prod-thumb img { width:100%; height:100%; object-fit:cover; }
  .prod-thumb .ph { position:absolute; inset:0; display:grid; place-items:center; }
  .prod-thumb .ph svg { width:44px; height:44px; stroke-width:1.3; opacity:.5; }
  .wish-btn { position:absolute; top:7px; right:7px; width:34px; height:34px; background:rgba(255,253,249,.92); border-radius:50%; display:grid; place-items:center; color:var(--ink); box-shadow:var(--shadow); z-index:2; }
  .wish-btn svg { width:18px; height:18px; }
  .wish-btn.on { color:var(--danger); }
  .prod-body { padding:10px 11px 12px; display:flex; flex-direction:column; gap:3px; flex:1; }
  .prod-title { font-size:14.5px; font-weight:600; line-height:1.2; cursor:pointer; }
  .prod-meta { font-size:11.5px; color:var(--ink-soft); }
  .prod-price-row { display:flex; align-items:baseline; gap:7px; margin-top:4px; }
  .prod-price { font-size:18px; font-weight:700; }
  .prod-mrp { font-size:12px; color:var(--ink-soft); text-decoration:line-through; }
  .add-btn { margin-top:10px; border:1.5px solid var(--accent); color:var(--accent); background:var(--surface); font-weight:600; font-size:14px; padding:10px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:6px; transition:background .12s,color .12s; }
  .add-btn svg { width:18px; height:18px; }
  .add-btn:active,.add-btn:hover { background:var(--accent); color:#fff; }
  .add-btn.oos { border-color:var(--line-dark); color:var(--ink-soft); }
  .card-step { margin-top:10px; display:flex; align-items:center; justify-content:space-between; border:1.5px solid var(--accent); border-radius:10px; overflow:hidden; }
  .card-step button { width:40px; height:40px; display:grid; place-items:center; color:#fff; background:var(--accent); }
  .card-step button svg { width:18px; height:18px; }
  .card-step span { font-weight:700; font-size:15px; }

  .chips { display:flex; gap:8px; overflow-x:auto; padding:4px 0 10px; scrollbar-width:none; }
  .chips::-webkit-scrollbar { display:none; }
  .chip { white-space:nowrap; padding:9px 15px; border-radius:30px; border:1px solid var(--line-dark); background:var(--surface); font-size:14px; color:var(--ink-soft); transition:all .12s; cursor:pointer; }
  .chip.active,.chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  .back-bar { display:flex; align-items:center; gap:10px; margin:4px 0 2px; }
  .back-btn { display:inline-flex; align-items:center; gap:5px; font-size:15px; font-weight:500; color:var(--accent-2); padding:6px 0; }
  .back-btn svg { width:20px; height:20px; }
  .page-h { font-size:23px; font-weight:600; margin:6px 2px 2px; }
  .page-sub { font-size:13px; color:var(--ink-soft); margin:0 2px 14px; }

  .sub-list { display:flex; flex-direction:column; gap:10px; }
  .sub-row { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; }
  .sub-row:hover { border-color:var(--accent); }
  .sub-row span.t { font-size:16px; font-weight:600; }
  .sub-row svg { width:20px; height:20px; color:var(--accent-2); }

  .age-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .age-card { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px 8px; text-align:center; font-weight:700; font-size:18px; transition:all .12s; }
  .age-card:hover { border-color:var(--accent); color:var(--accent); }
  .age-card small { display:block; font-weight:400; font-size:11px; color:var(--ink-soft); margin-top:2px; }

  /* Compact product detail */
  .pd { display:flex; flex-direction:column; gap:14px; }
  .pd-main { border-radius:var(--radius-lg); overflow:hidden; background:var(--surface-2); border:1px solid var(--line); aspect-ratio:1/1; max-height:36vh; margin:0 auto; width:auto; position:relative; }
  .pd-main img { width:100%; height:100%; object-fit:cover; }
  .pd-main .ph { position:absolute; inset:0; display:grid; place-items:center; }
  .pd-main .ph svg { width:80px; height:80px; stroke-width:1.1; opacity:.5; }
  .pd-thumbs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .pd-thumbs .t { width:48px; height:48px; border-radius:9px; overflow:hidden; border:2px solid var(--line-dark); }
  .pd-thumbs .t.on { border-color:var(--accent); }
  .pd-thumbs .t img { width:100%; height:100%; object-fit:cover; }
  .pd-info h2 { font-size:22px; margin:0 0 2px; }
  .pd-price-row { display:flex; align-items:baseline; gap:8px; margin:6px 0 2px; }
  .pd-price { font-size:24px; font-weight:700; }
  .var-lbl { font-size:12px; font-weight:600; color:var(--ink-soft); margin:10px 0 6px; }
  .colors { display:flex; gap:9px; flex-wrap:wrap; }
  .color-dot { width:30px; height:30px; border-radius:50%; border:2px solid var(--line-dark); cursor:pointer; position:relative; }
  .color-dot.on { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
  .size-chips { display:flex; gap:8px; flex-wrap:wrap; }
  .size-chip { padding:8px 14px; border-radius:9px; border:1.5px solid var(--line-dark); font-weight:600; font-size:14px; cursor:pointer; }
  .size-chip.on { border-color:var(--accent); background:var(--accent-soft); color:var(--accent); }
  .qty-row { display:flex; align-items:center; gap:14px; margin:14px 0 4px; }
  .qty-ctrl { display:flex; align-items:center; border:1px solid var(--line-dark); border-radius:12px; overflow:hidden; }
  .qty-ctrl button { width:44px; height:44px; display:grid; place-items:center; color:var(--accent); }
  .qty-ctrl button svg { width:20px; height:20px; }
  .qty-ctrl span { min-width:38px; text-align:center; font-weight:700; font-size:17px; }
  .pd-specs { border-top:1px solid var(--line); margin-top:6px; }
  .pd-specs .row { display:flex; justify-content:space-between; padding:9px 2px; border-bottom:1px solid var(--line); font-size:13.5px; }
  .pd-specs .row span:first-child { color:var(--ink-soft); }

  .btn-primary { background:var(--accent); color:#fff; font-weight:600; font-size:16px; padding:15px; border-radius:12px; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .12s; }
  .btn-primary svg { width:20px; height:20px; }
  .btn-primary:active { background:#0d271f; }
  .btn-primary:disabled { background:#a9b3ad; }
  .btn-wa { background:#1f8f4e; } .btn-wa:active { background:#187a41; }
  .btn-danger { background:var(--danger); }
  .btn-outline { background:var(--surface); border:1px solid var(--line-dark); color:var(--ink); font-weight:600; font-size:15px; padding:13px; border-radius:12px; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-outline svg { width:18px; height:18px; }

  .cart-item { display:flex; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:11px; margin-bottom:11px; }
  .cart-thumb { width:66px; height:66px; border-radius:10px; overflow:hidden; background:var(--surface-2); display:grid; place-items:center; flex-shrink:0; }
  .cart-thumb img { width:100%; height:100%; object-fit:cover; }
  .cart-thumb svg { width:30px; height:30px; opacity:.5; }
  .cart-info { flex:1; min-width:0; }
  .cart-info h4 { margin:0 0 2px; font-size:15px; font-weight:600; }
  .cart-info .m { font-size:12px; color:var(--ink-soft); }
  .cart-qc { display:flex; align-items:center; gap:12px; margin-top:8px; }
  .cart-qc .qty-ctrl button { width:34px; height:34px; } .cart-qc .qty-ctrl button svg { width:17px; height:17px; }
  .cart-qc .qty-ctrl span { min-width:30px; font-size:15px; }
  .cart-remove { color:var(--danger); display:grid; place-items:center; padding:4px; }
  .cart-remove svg { width:19px; height:19px; }
  .cart-line-price { font-weight:700; font-size:16px; text-align:right; white-space:nowrap; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:8px 0 4px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field.full { grid-column:1 / -1; }
  .field label { font-size:13px; font-weight:500; color:var(--ink-soft); display:flex; align-items:center; gap:6px; }
  .field label svg { width:16px; height:16px; }
  .field input,.field textarea,.field select { padding:13px; border:1px solid var(--line-dark); border-radius:10px; font-size:16px; background:var(--surface); color:var(--ink); outline:none; }
  .field input:focus,.field textarea:focus,.field select:focus { border-color:var(--accent); }
  .field .err { border-color:var(--danger) !important; }

  .summary { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:15px; margin:15px 0; }
  .summary .row { display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }
  .summary .row.total { font-size:20px; font-weight:700; border-top:1px solid var(--line); margin-top:6px; padding-top:12px; }

  .empty { text-align:center; padding:56px 20px; color:var(--ink-soft); }
  .empty svg { width:54px; height:54px; margin:0 auto 14px; opacity:.4; stroke-width:1.2; }

  .fabs { position:fixed; right:15px; bottom:112px; z-index:45; display:flex; flex-direction:column; gap:12px; }
  .fab { width:54px; height:54px; border-radius:50%; display:grid; place-items:center; box-shadow:var(--shadow-lg); color:#fff; }
  .fab svg { width:26px; height:26px; }
  .fab.wa { background:#1f8f4e; } .fab.call { background:var(--accent); }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:44; background:var(--surface); border-top:1px solid var(--line); display:flex; justify-content:space-around; padding:13px 0 max(13px,env(safe-area-inset-bottom)); box-shadow:0 -3px 14px rgba(60,40,25,.06); }
  .bottom-nav button { display:flex; flex-direction:column; align-items:center; gap:5px; font-size:12.5px; font-weight:500; color:var(--ink-soft); flex:1; position:relative; }
  .bottom-nav button svg { width:28px; height:28px; }
  .bottom-nav button.active { color:var(--accent); }
  .nav-badge { position:absolute; top:-3px; right:50%; margin-right:-22px; background:var(--danger); color:#fff; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:8px; display:grid; place-items:center; padding:0 4px; }

  .toast { position:fixed; left:50%; bottom:150px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:12px 20px; border-radius:30px; font-size:14px; font-weight:500; z-index:60; opacity:0; pointer-events:none; transition:all .25s; box-shadow:var(--shadow-lg); max-width:90vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .contact-row { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:2px; }
  .contact-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:15px 8px; text-align:center; font-size:12.5px; font-weight:500; }
  .contact-card svg { width:26px; height:26px; margin:0 auto 7px; color:var(--accent); }
  .site-footer { text-align:center; padding:28px 16px 12px; color:var(--ink-soft); font-size:12px; }
  .site-footer button { display:inline-flex; align-items:center; gap:5px; color:var(--ink-soft); margin-top:6px; }
  .site-footer button svg { width:15px; height:15px; }

  .wholesale-hero { position:relative; overflow:hidden; background:var(--accent); color:#f4efe4; border-radius:var(--radius-lg); padding:26px 20px; margin-bottom:18px; }
  .wholesale-hero .pattern { position:absolute; inset:0; opacity:.1; background-size:50px 50px; }
  .wholesale-hero h2 { position:relative; margin:0 0 6px; font-size:22px; }
  .wholesale-hero p { position:relative; margin:0; opacity:.85; font-size:14px; }

  .skel-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .skel { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); height:240px; position:relative; overflow:hidden; }
  .skel::after { content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(0,0,0,.03),transparent); transform:translateX(-100%); animation:sh 1.2s infinite; }
  @keyframes sh { 100% { transform:translateX(100%); } }

  /* Admin */
  .admin-wrap { max-width:760px; margin:0 auto; }
  .admin-login { max-width:380px; margin:40px auto; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:28px 24px; text-align:center; }
  .admin-login .lk { width:54px; height:54px; border-radius:14px; background:var(--accent-soft); color:var(--accent); display:grid; place-items:center; margin:0 auto 14px; }
  .admin-login .lk svg { width:28px; height:28px; }
  .admin-tabs { display:flex; gap:8px; margin:6px 0 16px; }
  .admin-tabs button { flex:1; padding:11px; border-radius:10px; border:1px solid var(--line-dark); background:var(--surface); font-weight:600; font-size:13.5px; display:flex; align-items:center; justify-content:center; gap:6px; color:var(--ink-soft); }
  .admin-tabs button svg { width:17px; height:17px; }
  .admin-tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .admin-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
  .stat-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px 8px; text-align:center; }
  .stat-card .n { font-size:26px; font-weight:700; }
  .stat-card .l { font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.4px; }
  .admin-row { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:10px; margin-bottom:9px; }
  .admin-row .th { width:50px; height:50px; border-radius:10px; overflow:hidden; background:var(--surface-2); display:grid; place-items:center; flex-shrink:0; }
  .admin-row .th img { width:100%; height:100%; object-fit:cover; }

let TR = {}; try { TR = JSON.parse(localStorage.getItem("rw_tr")||"{}"); } catch(e){}
const pendingTr = new Set(); let trBusy=false;
function P(text){ // translate product text
  if(!text || LANG==="en") return text||"";
  const k = LANG+"|"+text;
  if(k in TR) return TR[k];
  pendingTr.add(text);
  return text; // fallback until translated
}
async function flushTr(){
  if(trBusy || LANG==="en" || !pendingTr.size) return;
  trBusy=true;
  const items=[...pendingTr]; pendingTr.clear();
  for(const text of items){
    const k=LANG+"|"+text;
    if(k in TR) continue;
    try{
      const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${LANG}&dt=t&q=${encodeURIComponent(text)}`);
      const d=await r.json();
      TR[k]=(d[0]||[]).map(x=>x[0]).join("");
    }catch(e){ TR[k]=text; } // on failure keep original, stop retrying
  }
  try{ localStorage.setItem("rw_tr", JSON.stringify(TR)); }catch(e){}
  trBusy=false;
  render();
}

function cartTotal(){ return store.cart.reduce((s,i)=>{ const p=byId(i.id); return s+(p?p.price*i.qty:0); },0); }
function cartQtyFor(id,size,color){ const it=store.cart.find(i=>i.id===id&&(i.size||'')===(size||'')&&(i.color||'')===(color||'')); return it?it.qty:0; }
function addToCart(id,qty=1,size="",color=""){ const p=byId(id); if(!p||p.stock<=0){ toast(t('outstock')); return; } const it=store.cart.find(i=>i.id===id&&(i.size||'')===(size||'')&&(i.color||'')===(color||'')); if(it) it.qty+=qty; else store.cart.push({id,qty,size,color}); persist(); updateBadges(); toast(t('added')); render(); }
function setQtyLine(id,size,color,qty){ const it=store.cart.find(i=>i.id===id&&(i.size||'')===(size||'')&&(i.color||'')===(color||'')); if(!it){ if(qty>0) addToCart(id,qty,size,color); return; } it.qty=qty; if(it.qty<=0) store.cart=store.cart.filter(i=>i!==it); persist(); updateBadges(); render(); }
function toggleWish(id){ if(store.wishlist.includes(id)) store.wishlist=store.wishlist.filter(x=>x!==id); else store.wishlist.push(id); persist(); render(); }
const isWished=id=>store.wishlist.includes(id);
function trackRecent(id){ store.recent=[id,...store.recent.filter(x=>x!==id)].slice(0,8); persist(); }

/* ============ NAV ============ */
function go(view,opts={}){ store.view=view;
  if(opts.cat!==undefined) store.filterCat=opts.cat; if(opts.sub!==undefined) store.filterSub=opts.sub; if(opts.age!==undefined) store.filterAge=opts.age;
  if(view==="home"){ store.filterCat=store.filterSub=store.filterAge=null; store.search=""; const si=document.getElementById("searchInput"); if(si) si.value=""; }
  if(view!=="admin"&&location.hash==="#admin") history.replaceState(null,"",location.pathname);
  window.scrollTo(0,0); render();
}
function onSearch(v){ store.search=v.trim().toLowerCase(); if(store.search&&store.view!=="search") store.view="search"; if(!store.search&&store.view==="search") store.view="home"; render(); }
function matchesSearch(p){ if(!store.search) return true; return [p.title,p.cat,p.sub,p.age,p.fabric,catOf(p.cat)&&catOf(p.cat).name,(p.colors||[]).join(" ")].join(" ").toLowerCase().includes(store.search); }

/* ============ RENDER ============ */
const app=document.getElementById("app");
function render(){
  updateBadges();
  let html="";
  switch(store.view){
    case "home":html=viewHome();break; case "categories":html=viewCategories();break; case "category":html=viewCategory();break;
    case "age":html=viewAge();break; case "products":html=viewProducts();break; case "detail":html=viewDetail();break;
    case "cart":html=viewCart();break; case "wishlist":html=viewWishlist();break; case "search":html=viewSearch();break;
    case "confirm":html=viewConfirm();break;
    case "wholesale":html=viewWholesale();break; case "admin":html=viewAdmin();break; default:html=viewHome();
  }
  app.innerHTML=html;
  const adminMode = store.view==="admin";
  const fabs=document.querySelector('.fabs'); if(fabs) fabs.style.display=adminMode?'none':'';
  const lb=document.getElementById('langBtn'); if(lb) lb.style.display=adminMode?'none':'';
  const ab=document.getElementById('announceBar'); if(ab) ab.style.display=adminMode?'none':'';
  updateCartBar();
  if(LANG!=="en" && pendingTr.size) flushTr();
}
function updateCartBar(){ const bar=document.getElementById('cartBar'); if(!bar) return;
  const c=cartCount(); const hide=['cart','confirm','admin'].includes(store.view);
  if(c>0 && !hide){ bar.style.display='flex'; bar.innerHTML=`<div class="l"><span class="cb-count">${c}</span> ${t('view_cart')}</div><div class="r">${money(cartTotal())} ${icon('arrow')}</div>`; document.body.style.paddingBottom='168px'; }
  else { bar.style.display='none'; document.body.style.paddingBottom=''; }
}

function cardAdd(p){
  const q=cartQtyFor(p.id,"","");
  if(p.stock<=0) return `<button class="add-btn oos" onclick="notifyMe('${p.id}')">${icon('bell')} ${t('notify')}</button>`;
  if(q>0) return `<div class="card-step"><button onclick="event.stopPropagation();setQtyLine('${p.id}','','',${q-1})">${icon('minus')}</button><span>${q}</span><button onclick="event.stopPropagation();setQtyLine('${p.id}','','',${q+1})">${icon('plus')}</button></div>`;
  return `<button class="add-btn" onclick="event.stopPropagation();addToCart('${p.id}',1,'','')">${icon('plus')} ${t('add')}</button>`;
}
function productCard(p){
  return `<div class="prod-card">
    <div class="prod-thumb" onclick="openDetail('${p.id}')">${thumbHTML(p)}
      <button class="wish-btn ${isWished(p.id)?'on':''}" onclick="event.stopPropagation();toggleWish('${p.id}')">${isWished(p.id)?iconFill('heart'):icon('heart')}</button>
    </div>
    <div class="prod-body">
      <div class="prod-title" onclick="openDetail('${p.id}')">${escapeHtml(P(p.title))}</div>
      ${(()=>{ const ps=productSizes(p); return ps.length?`<div class="prod-meta">${escapeHtml(sizeLabel(ps[0]))}${ps.length>1?' +':''}</div>`:''; })()}
      <div class="prod-price-row"><span class="prod-price">${money(p.price)}</span>${p.mrp>p.price?`<span class="prod-mrp">${money(p.mrp)}</span>`:''}</div>
      ${cardAdd(p)}
    </div></div>`;
}
function catCount(id){ return shopProducts().filter(p=>p.cat===id).length; }
function catCard(c){
  const photo=c.image_url?`<img src="${escapeHtml(c.image_url)}" alt="${escapeHtml(c.name)}" loading="lazy"/>`:`<div class="ph">${icon(c.icon)}</div>`;
  const n=catCount(c.id);
  const foot=c.special?`<div class="cnt">${t('wholesale')}</div>`:`<div class="cnt">${n} ${n!==1?t('products'):t('product')}</div>`;
  return `<div class="cat-card" onclick="${c.special?"go('wholesale')":`openCategory('${c.id}')`}"><div class="cat-photo">${photo}</div><div class="cat-foot"><div class="name">${escapeHtml(catName(c.id))}</div>${foot}</div></div>`;
}
function skeleton(){ return `<div class="hero" style="min-height:150px"></div><div class="section-head"><h3>${t('loading')}</h3></div><div class="skel-grid">${Array(4).fill('<div class="skel"></div>').join("")}</div>`; }

      <div class="trust-item"><div class="ti">${icon('box')}</div><div><h5>${t('t_pack')}</h5><p>100% privacy</p></div></div>
      <div class="trust-item"><div class="ti">${icon('rotate')}</div><div><h5>${t('t_return')}</h5><p>Hassle free</p></div></div>
      <div class="trust-item"><div class="ti">${icon('headset')}</div><div><h5>${t('t_support')}</h5><p>Here to help</p></div></div>

function viewCategories(){ return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} ${t('home')}</a></div><div class="page-h">${t('shop_title')}</div><div class="cat-grid">${homeCats().map(catCard).join("")}</div>`; }
function catTypeNames(catId){ const m=subsForCat(catId); if(m.length) return m.map(s=>s.name); return subsFor(catId); }
function openCategory(catId){ if(catTypeNames(catId).length) go("category",{cat:catId,sub:null,age:null}); else go("products",{cat:catId,sub:null,age:null}); }
function viewCategory(){ const managed=subsForCat(store.filterCat);
  const body = managed.length
    ? `<div class="cat-grid">${managed.map(s=>{ const photo=s.image_url?`<img src="${escapeHtml(s.image_url)}" alt="${escapeHtml(s.name)}" loading="lazy"/>`:`<div class="ph">${icon(catIcon(store.filterCat))}</div>`; return `<div class="cat-card" onclick='openSub("${store.filterCat}",${JSON.stringify(s.name)})'><div class="cat-photo">${photo}</div><div class="cat-foot"><div class="name">${escapeHtml(P(s.name))}</div></div></div>`; }).join("")}</div>`
    : `<div class="sub-list">${subsFor(store.filterCat).map(s=>`<div class="sub-row" onclick='openSub("${store.filterCat}",${JSON.stringify(s)})'><span class="t">${escapeHtml(P(s))}</span>${icon('arrow')}</div>`).join("")}</div>`;
  return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} ${t('home')}</a></div>
    <div class="page-h">${escapeHtml(catName(store.filterCat))}</div><div class="page-sub">${t('choose_type')}</div>${body}`;
}
function openSub(catId,sub){ const rel=shopProducts().filter(p=>p.cat===catId&&p.sub===sub); const sizes=[...new Set(rel.flatMap(productSizes))]; if(sizes.length>1) go("age",{cat:catId,sub,age:null}); else go("products",{cat:catId,sub,age:null}); }
function viewAge(){
  const rel=shopProducts().filter(p=>p.cat===store.filterCat && (!store.filterSub||p.sub===store.filterSub));
  let list=sortSizes([...new Set(rel.flatMap(productSizes))]);
  if(!list.length){ const isWomen=/women/i.test(store.filterSub||""); list=isWomen?AGE_ADULT:AGE_KIDS.concat(["Adult Free Size"]); }
  return `<div class="back-bar"><a class="back-btn" onclick="go('category',{cat:'${store.filterCat}'})">${icon('back')} ${escapeHtml(catName(store.filterCat))}</a></div>
    <div class="page-h">${escapeHtml(P(store.filterSub)||catName(store.filterCat))}</div><div class="page-sub">${t('choose_size')}</div>
    <div class="age-grid">${list.map(a=>{ const yr=/(\d+)\s*year/i.exec(a); const main=yr?yr[1]:sizeLabel(a); const sub=yr?(LANG==='en'?'yr':sizeLabel('Years')):''; return `<div class="age-card" onclick='go("products",{cat:"${store.filterCat}",sub:${JSON.stringify(store.filterSub||"")},age:${JSON.stringify(a)}})'>${escapeHtml(main)}<small>${sub}</small></div>`; }).join("")}</div>
    <div style="margin-top:14px"><button class="btn-outline" onclick='go("products",{cat:"${store.filterCat}",sub:${JSON.stringify(store.filterSub||"")},age:null})'>${t('show_all')}</button></div>`;
}
function filteredProducts(){ let list=shopProducts().filter(p=>{ if(store.filterCat&&p.cat!==store.filterCat) return false; if(store.filterSub&&p.sub!==store.filterSub) return false; if(store.filterAge&&!productSizes(p).includes(store.filterAge)) return false; return true; });
  switch(store.sort){ case "low":list.sort((a,b)=>a.price-b.price);break; case "high":list.sort((a,b)=>b.price-a.price);break; case "popular":list.sort((a,b)=>b.stars-a.stars);break; } return list; }
function viewProducts(){ const list=filteredProducts(); const backTo=subsFor(store.filterCat).length?`go('category',{cat:'${store.filterCat}'})`:"go('home')";
  return `<div class="back-bar"><a class="back-btn" onclick="${backTo}">${icon('back')} ${t('back')}</a></div>
    <div class="page-h">${escapeHtml(catName(store.filterCat))}</div>
    <div class="page-sub">${[P(store.filterSub),sizeLabel(store.filterAge)].filter(Boolean).join(' · ')||t('all')} · ${list.length}</div>
    <div class="chips">${[['featured',t('all')],['low','₹ ↓'],['high','₹ ↑'],['popular',t('popular')]].map(([v,l])=>`<div class="chip ${store.sort===v?'active':''}" onclick="setSort('${v}')">${l}</div>`).join("")}</div>
    ${list.length?`<div class="prod-grid">${list.map(productCard).join("")}</div>`:`<div class="empty">${icon('search','')}${t('nothing')}</div>`}`;
}
function setSort(s){ store.sort=s; render(); }

/* ---------- DETAIL (compact, variant selectors) ---------- */
let pdSize="", pdColor="", pdImg=0, pdQty=1;
function openDetail(id){ trackRecent(id); const p=byId(id); pdSize=(p&&productSizes(p)[0])||""; pdColor=(p&&p.colors&&p.colors[0])||""; pdImg=0; pdQty=1; store._detailId=id; go("detail"); }
function viewDetail(){ const p=byId(store._detailId); if(!p) return viewHome(); const oos=p.stock<=0; const imgs=(p.images&&p.images.length)?p.images:(p.image?[p.image]:[]); const ps=productSizes(p);
  const mainImg = imgs.length?`<img src="${escapeHtml(imgs[pdImg]||imgs[0])}" onerror="this.style.display='none'"/>`:`<div class="ph">${icon(catIcon(p.cat),'')}</div>`;
  const inCartQ=cartQtyFor(p.id,pdSize,pdColor);
  return `<div class="back-bar"><a class="back-btn" onclick="go('products',{cat:'${p.cat}'})">${icon('back')} ${escapeHtml(catName(p.cat))}</a></div>
    <div class="pd">
      <div>
        <div class="pd-main">${mainImg}</div>
        ${imgs.length>1?`<div class="pd-thumbs" style="margin-top:10px">${imgs.map((im,i)=>`<div class="t ${i===pdImg?'on':''}" onclick="pdImg=${i};render()"><img src="${escapeHtml(im)}"/></div>`).join("")}</div>`:''}
      </div>
      <div class="pd-info">
        <div class="prod-meta">${escapeHtml(catName(p.cat))}</div>
        <h2>${escapeHtml(P(p.title))}</h2>
        <div style="color:var(--gold);font-size:14px">${"★".repeat(p.stars)}${"☆".repeat(5-p.stars)}</div>
        <div class="pd-price-row"><span class="pd-price">${money(p.price)}</span>${p.mrp>p.price?`<span class="prod-mrp" style="font-size:15px">${money(p.mrp)}</span>`:''}<span style="margin-left:auto;font-size:13px;font-weight:600;color:${oos?'var(--danger)':'var(--accent-2)'}">${oos?t('outstock'):t('available')}</span></div>
        ${ps.length>1?`<div class="var-lbl">${t('size')}</div><div class="size-chips">${ps.map(s=>`<div class="size-chip ${pdSize===s?'on':''}" onclick="pdSize=${JSON.stringify(s)};render()">${escapeHtml(sizeLabel(s))}</div>`).join("")}</div>`:(ps.length===1?`<div class="var-lbl">${t('size')}: <span style="color:var(--ink)">${escapeHtml(sizeLabel(ps[0]))}</span></div>`:'')}
        ${(p.colors&&p.colors.length)?`<div class="var-lbl">${t('colour')}</div><div class="colors">${p.colors.map(c=>`<div class="color-dot ${pdColor===c?'on':''}" style="background:${c}" onclick="pdColor='${c}';render()"></div>`).join("")}</div>`:''}
        ${oos?`<div style="height:12px"></div><button class="btn-primary" onclick="notifyMe('${p.id}')">${icon('bell')} ${t('notify')}</button>`
          :`<div class="qty-row"><span style="font-weight:600">${t('qty')}</span><div class="qty-ctrl"><button onclick="pdQty=Math.max(1,pdQty-1);render()">${icon('minus')}</button><span>${pdQty}</span><button onclick="pdQty++;render()">${icon('plus')}</button></div>${inCartQ?`<span style="font-size:12px;color:var(--ink-soft)">(${inCartQ} ${t('cart')})</span>`:''}</div>
            <button class="btn-primary" onclick="addToCart('${p.id}',${'pdQty'?pdQty:1},pdSize,pdColor)">${icon('cart')} ${t('add_cart')}</button>`}
        ${p.fabric?`<div class="pd-specs"><div class="row"><span>${t('fabric')}</span><span>${escapeHtml(P(p.fabric))}</span></div></div>`:''}
        ${p.desc?`<p style="font-size:13.5px;color:var(--ink-soft);margin:10px 0 0">${escapeHtml(P(p.desc))}</p>`:''}
        <div style="height:10px"></div><button class="btn-outline" onclick="shareProduct('${p.id}')">${icon('share')} ${t('share')}</button>

/* ---------- CART ---------- */

  if(!store.cart.length) return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} ${t('back')}</a></div><div class="empty">${icon('cart','')}${t('cart_empty')}<br/><br/><button class="btn-primary" style="max-width:220px;margin:0 auto" onclick="go('categories')">${t('shop_now')}</button></div>`;
  const total=cartTotal();
  return `<div class="back-bar"><a class="back-btn" onclick="go('home')">${icon('back')} ${t('back')}</a></div>
    <div class="page-h">${t('cart')}</div><div class="page-sub">${cartCount()} ${cartCount()!==1?t('items'):t('item')}</div>
    ${store.cart.map(it=>{ const p=byId(it.id); if(!p) return ''; const meta=[sizeLabel(it.size||productSizes(p)[0]||''), it.color?`<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${it.color};vertical-align:middle;border:1px solid #0002"></span>`:''].filter(Boolean).join(' · ');

        <div class="cart-info"><h4>${escapeHtml(P(p.title))}</h4><div class="m">${meta}</div>

          <button class="cart-remove" onclick='setQtyLine("${p.id}",${JSON.stringify(it.size||"")},${JSON.stringify(it.color||"")},0)'>${icon('trash')}</button></div></div>
        <div class="cart-line-price">${money(p.price*it.qty)}</div></div>`; }).join("")}
    <div class="summary">
      <div class="row"><span>${t('subtotal')}</span><span>${money(total)}</span></div>
      <div class="row"><span>${t('delivery')}</span><span>${deliveryFor(total)===0?`<b style="color:var(--accent-2)">${t('free')}</b>`:money(deliveryFor(total))}</span></div>
      <div class="row total"><span>${t('total')}</span><span>${money(total+deliveryFor(total))}</span></div>
    </div>
    ${total<CONFIG.freeAbove?`<div class="free-hint">${t('add_more')}${money(CONFIG.freeAbove-total)}${t('more_for_free')}</div>`:''}
    <div class="page-h" style="font-size:18px">${t('your_details')}</div>
    <div class="form-grid">
      <div class="field full"><label>${t('name')}</label><input id="f_name" placeholder="${t('name')}"/></div>
      <div class="field full"><label>${icon('phone')} ${t('mobile')}</label><input id="f_phone" type="tel" inputmode="numeric" placeholder="${t('mobile')}"/></div>
      <div class="field full"><label>${icon('pin')} ${t('address')}</label><textarea id="f_addr" rows="2"></textarea></div>
      <div class="field"><label>${t('city')}</label><input id="f_city" value="${CONFIG.city}"/></div>
      <div class="field"><label>${t('pin')}</label><input id="f_pin" inputmode="numeric"/></div>
    </div>
    <div style="height:8px"></div>
    <button class="btn-primary btn-wa" onclick="placeOrder()">${icon('check')} ${t('place_order')}</button>
    <div style="font-size:12px;color:var(--ink-soft);text-align:center;margin:10px 0 20px">${t('no_pay')}</div>`;
}
function deliveryFor(sub){ return sub>=CONFIG.freeAbove?0:CONFIG.deliveryFee; }
function placeOrder(){ const g=id=>(document.getElementById(id)||{}).value||"";
  const name=g("f_name").trim(),phone=g("f_phone").trim(),addr=g("f_addr").trim(),city=g("f_city").trim()||CONFIG.city,pin=g("f_pin").trim();
  let ok=true; [["f_name",name],["f_phone",phone],["f_addr",addr]].forEach(([id,v])=>{ const el=document.getElementById(id); if(!v){el.classList.add("err");ok=false;} else el.classList.remove("err"); });
  if(!ok){ toast(t('fill_req')); return; }
  if(!/^\d{10}$/.test(phone.replace(/\D/g,'').slice(-10))){ document.getElementById("f_phone").classList.add("err"); toast(t('mobile')); return; }
  const sub=cartTotal(), del=deliveryFor(sub);
  const items=store.cart.map(it=>{ const p=byId(it.id); return { title:p?p.title:'', size:it.size||(p?productSizes(p)[0]:'')||'', color:it.color||'', qty:it.qty, price:p?p.price:0 }; });
  const ref='RW'+Date.now().toString(36).toUpperCase().slice(-6);
  store.lastOrder={ ref, name, phone, addr, city, pin, items, sub, del, total:sub+del };
  store.cart=[]; persist(); updateBadges();
  store.view='confirm'; window.scrollTo(0,0); render();
  // record order in database (fire-and-forget; confirmation already shown)
  sbRpc("rw_place_order",{ p:{ ref, name, phone, address:addr, city, pin, items, subtotal:sub, delivery:del, total:sub+del } }).catch(()=>{});
}
function buildOrderMsg(o){ let msg=`Assalamualaikum.\nOrder ${o.ref}\n\nName: ${o.name}\nMobile: ${o.phone}\n\nProducts\n`;
  o.items.forEach((it,i)=>{ msg+=`${i+1}. ${it.title}\n`; if(it.size) msg+=`   Size: ${it.size}\n`; if(it.color){ const nm=(PALETTE.find(c=>c.h.toLowerCase()===it.color.toLowerCase())||{}).n; msg+=`   Colour: ${nm||it.color}\n`; } msg+=`   Qty: ${it.qty} x ${money(it.price)} = ${money(it.price*it.qty)}\n`; });
  msg+=`\nSubtotal: ${money(o.sub)}\nDelivery: ${o.del===0?'FREE':money(o.del)}\nTotal: ${money(o.total)}\n\nAddress\n${o.addr}\n${o.city}${o.pin?` - ${o.pin}`:''}\n\nPlease confirm. Thank you.`;
  return msg;
}
function sendOrderWhatsApp(){ const o=store.lastOrder; if(!o) return; window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(buildOrderMsg(o))}`,"_blank"); }

    <div class="summary">
      ${o.items.map(it=>`<div class="row"><span>${escapeHtml(P(it.title))}${it.size?` · ${escapeHtml(sizeLabel(it.size))}`:''} × ${it.qty}</span><span>${money(it.price*it.qty)}</span></div>`).join("")}
      <div class="row"><span>${t('subtotal')}</span><span>${money(o.sub)}</span></div>
      <div class="row"><span>${t('delivery')}</span><span>${o.del===0?`<b style="color:var(--accent-2)">${t('free')}</b>`:money(o.del)}</span></div>
      <div class="row total"><span>${t('total')}</span><span>${money(o.total)}</span></div>
    </div>
    <div style="font-size:13px;color:var(--ink-soft);text-align:center;margin:6px 2px 14px">${t('confirm_note')}</div>

function wsToggleCat(name){ const a=store.ws.cats; const i=a.indexOf(name); if(i>=0) a.splice(i,1); else a.push(name); render(); }
function viewWholesale(){ if(!store.ws) store.ws={name:"",business:"",city:CONFIG.city,phone:"",qty:"",cats:[]};

      <div class="field"><label>${t('business_name')}</label><input id="w_business" value="${escapeHtml(w.business)}" oninput="wsInput('business',this.value)"/></div>

      <div class="field full"><label>${icon('phone')} ${t('mobile')}</label><input id="w_phone" type="tel" inputmode="numeric" value="${escapeHtml(w.phone)}" oninput="wsInput('phone',this.value)"/></div>

    <button class="btn-primary btn-wa" onclick="wholesaleInquiry()">${icon('whatsapp')} ${t('send_wa')}</button><div style="height:24px"></div>`;

function wholesaleInquiry(){ const w=store.ws||{};
  const name=(w.name||"").trim(),business=(w.business||"").trim(),city=(w.city||"").trim(),phone=(w.phone||"").trim(),qty=(w.qty||"").trim();
  if(!name||!city||!phone){ [["w_name",name],["w_city",city],["w_phone",phone]].forEach(([id,v])=>{const el=document.getElementById(id); if(el&&!v)el.classList.add("err");}); toast(t('fill_req')); return; }
  const cats=(w.cats&&w.cats.length)?w.cats.join(', '):'-';
  const m=`Assalamualaikum.\nWholesale Inquiry\n\nName: ${name}\nBusiness: ${business||'-'}\nCity: ${city}\nPhone: ${phone}\nProduct Category: ${cats}\nMonthly need: ${qty||'-'}\n\nThank you.`;
  window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(m)}`,"_blank"); toast(t('send_wa'));
}
function notifyMe(id){ const p=byId(id); const m=`Assalamualaikum.\nNotify me when back in stock:\n${p.title}${p.age?` (${p.age})`:''}\nThank you.`; window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(m)}`,"_blank"); }
function shareProduct(id){ const p=byId(id); const text=`${p.title} - ${money(p.price)}\nOrder at ${CONFIG.businessName}`; if(navigator.share){ navigator.share({title:p.title,text}).catch(()=>{}); } else { window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank"); } }

/* ============ ADMIN ============ */
function openAdmin(){ store.view="admin"; store.admin.form=null; store.admin.catAdding=false; store.admin.bulk=false; store.admin.catEditId=null; if(!store.admin.tab) store.admin.tab="dashboard"; location.hash="#admin"; window.scrollTo(0,0); render(); }
function adminGo(tab){ store.admin.tab=tab; store.admin.form=null; store.admin.bulk=false; store.admin.catAdding=false; store.admin.catEditId=null; window.scrollTo(0,0); if(tab==='orders'&&!store.admin.ordersLoaded) loadOrders(); render(); }
function adminTab(t2){ adminGo(t2); }
function viewAdmin(){
  if(!store.admin.pass) return adminLogin();
  if(store.admin.form) return adminFormView();
  if(store.admin.bulk) return adminBulkView();
  if(store.admin.catEditId) return adminCategoryEditor();
  const title={dashboard:"Dashboard",products:"Products",categories:"Categories",orders:"Orders"}[store.admin.tab]||"Dashboard";
  let body; switch(store.admin.tab){ case "products":body=adminProducts();break; case "categories":body=adminCategories();break; case "orders":body=adminOrders();break; default:body=adminDashboard(); }
  return `<div class="admin-wrap"><div class="page-h" style="margin-top:8px">${title}</div>${body}<div style="height:40px"></div></div>`;
}
function adminDashboard(){
  const prods=store.products, cats=store.categories, subs=store.subcategories;
  const stockValue=prods.reduce((s,p)=>s+(p.price*p.stock),0);
  return `
    <div class="admin-stats">
      <div class="stat-card"><div class="n">${prods.length}</div><div class="l">Products</div></div>
      <div class="stat-card"><div class="n">${money(stockValue)}</div><div class="l">Stock Value</div></div>
      <div class="stat-card"><div class="n">${prods.filter(p=>p.active).length}</div><div class="l">Live</div></div>
    </div>
    <div class="admin-stats" style="grid-template-columns:repeat(2,1fr)">
      <div class="stat-card"><div class="n">${cats.length}</div><div class="l">Categories</div></div>
      <div class="stat-card"><div class="n">${subs.length}</div><div class="l">Sub-categories</div></div>
    </div>
    <div class="page-h" style="font-size:16px;margin-top:18px">By Category</div>
    ${cats.map(c=>{ const cp=prods.filter(p=>p.cat===c.id), cs=subsForCat(c.id);
      return `<div class="dash-cat"><div class="dash-cat-head"><div class="ci-sm">${c.image_url?`<img src="${escapeHtml(c.image_url)}"/>`:icon(c.icon)}</div><b>${escapeHtml(c.name)}</b><span>${cp.length} product${cp.length!==1?'s':''}</span></div>
        ${cs.length?`<div class="dash-subs">${cs.map(s=>`<div class="dash-sub"><span>${escapeHtml(s.name)}</span><span>${prods.filter(p=>p.cat===c.id&&p.subcategory===s.name).length}</span></div>`).join("")}</div>`:''}</div>`; }).join("")}`;
}
function loadOrders(){ sbRpc("rw_list_orders",{p_passcode:store.admin.pass}).then(rows=>{ store.admin.orders=rows||[]; store.admin.ordersLoaded=true; render(); }).catch(e=>{ toast(adminErr(e)); adminMaybeLogout(e); }); }
const ORDER_STATUSES=["new","confirmed","packed","delivered","cancelled"];
function adminOrders(){ const orders=store.admin.orders;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;color:var(--ink-soft)">${orders.length} order${orders.length!==1?'s':''}</span><button class="back-btn" onclick="store.admin.ordersLoaded=false;loadOrders()">${icon('rotate')} Refresh</button></div>
    ${store.admin.ordersLoaded?(orders.length?orders.map(adminOrderRow).join(""):`<div class="empty">${icon('receipt','')}No orders yet.</div>`):`<div class="empty">${icon('rotate','')}Loading orders...</div>`}`;
}
function adminOrderRow(o){ const items=o.items||[]; const d=new Date(o.created_at); const dstr=isNaN(d)?'':d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  return `<div class="order-card">
    <div class="order-top"><b>${escapeHtml(o.ref||'')}</b><span class="pill-stat ${o.status==='cancelled'?'oos':(o.status==='delivered'?'live':'hidden')}">${escapeHtml(o.status||'new')}</span></div>
    <div class="order-cust">${escapeHtml(o.name||'')} · <a href="tel:+${escapeHtml((o.phone||'').replace(/[^0-9]/g,''))}">${escapeHtml(o.phone||'')}</a></div>
    <div class="order-items">${items.map(it=>`${escapeHtml(it.title)}${it.size?` (${escapeHtml(it.size)})`:''} × ${it.qty}`).join('<br/>')}</div>
    <div class="order-addr">${escapeHtml(o.address||'')}${o.city?', '+escapeHtml(o.city):''}${o.pin?' - '+escapeHtml(o.pin):''}</div>
    <div class="order-foot"><span>${dstr}</span><b>${money(o.total)}</b></div>
    <button class="btn-primary btn-wa" style="padding:9px;font-size:13px;margin-top:9px" onclick="orderReplyWhatsApp('${o.id}')">${icon('whatsapp')} Reply on WhatsApp</button>
    <div class="chips" style="padding:9px 0 0">${ORDER_STATUSES.map(s=>`<button class="chip ${o.status===s?'on':''}" onclick="setOrderStatus('${o.id}','${s}')">${s}</button>`).join("")}</div></div>`;
}
function orderReplyWhatsApp(id){ const o=store.admin.orders.find(x=>x.id===id); if(!o) return;
  const phone='91'+(o.phone||'').replace(/[^0-9]/g,'').slice(-10);
  const items=(o.items||[]).map((it,i)=>`${i+1}. ${it.title}${it.size?` (${it.size})`:''} x ${it.qty}`).join('\n');
  const msg=`Assalamualaikum ${o.name||''},\nThank you for your order ${o.ref} from ${CONFIG.businessName}.\n\n${items}\n\nTotal: ${money(o.total)}\n\nWe will confirm availability and share delivery details shortly. JazakAllah khair.`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
}
async function setOrderStatus(id,status){ try{ await sbRpc("rw_update_order_status",{p_passcode:store.admin.pass,p_id:id,p_status:status}); const o=store.admin.orders.find(x=>x.id===id); if(o)o.status=status; render(); toast("Updated"); }catch(e){ toast(adminErr(e)); adminMaybeLogout(e); } }
function adminProducts(){ const all=store.products;
  return `<div style="display:flex;gap:8px"><button class="btn-primary" style="flex:1" onclick="adminNewProduct()">${icon('plus')} Add Product</button><button class="btn-outline" style="flex:0 0 auto;width:auto;padding:14px 16px" onclick="adminBulkStart()">${icon('list')} Bulk</button></div><div style="height:14px"></div>
    ${all.map(adminProductRow).join("")||`<div class="empty">${icon('box','')}No products.</div>`}`;
}
function adminProductRow(p){ const stat=p.stock<=0?'<span class="pill-stat oos">Out</span>':(p.active?'<span class="pill-stat live">Live</span>':'<span class="pill-stat hidden">Hidden</span>');
  return `<div class="admin-row ${p.active?'':'off'}" title="Double-tap to edit" ondblclick='adminEditProduct("${p.id}")'><div class="th">${thumbHTML(p)}</div>
    <div class="meta"><h4>${escapeHtml(p.title)}</h4><p>${escapeHtml((catOf(p.cat)||{}).name||p.cat)} · ${money(p.price)} · stk ${p.stock} ${stat}</p></div>
    <div class="acts"><button onclick='adminEditProduct("${p.id}")'>${icon('pencil')}</button><button class="del" onclick='adminDeleteProduct("${p.id}",${JSON.stringify(p.title)})'>${icon('trash')}</button></div></div>`;
}
function adminCategories(){
  return `${store.admin.catAdding?adminCatAddForm():`<button class="btn-primary" onclick="adminCatAddStart()">${icon('plus')} Add Category</button>`}<div style="height:14px"></div>
    ${store.categories.map(c=>{ const cnt=store.products.filter(p=>p.cat===c.id).length; const sc=subsForCat(c.id).length; return `<div class="cat-manage-row" onclick="adminOpenCategory('${c.id}')"><div class="ci">${c.image_url?`<img src="${escapeHtml(c.image_url)}" alt=""/>`:icon(c.icon)}</div><div class="nm">${escapeHtml(c.name)}<div class="cnt">${cnt} product${cnt!==1?'s':''} · ${sc} sub</div></div>${icon('arrow')}</div>`; }).join("")}`;
}
function adminCatAddStart(){ store.admin.catAdding=true; store.admin.newCat={name:"",image:""}; render(); }
function adminCatAddForm(){ const nc=store.admin.newCat;
  return `<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:6px">
    <div class="fld"><label>${icon('tag')} Category name</label><input style="width:100%;padding:13px;border:1px solid var(--line-dark);border-radius:10px;font-size:16px" value="${escapeHtml(nc.name)}" oninput="store.admin.newCat.name=this.value" placeholder="e.g. Prayer Mat"/></div>
    <div class="fld"><label>${icon('camera')} Photo</label><div style="display:flex;gap:10px;align-items:center"><div class="photo-tile" style="width:72px;height:72px" onclick="pickNewCatImage()">${nc.image?`<img src="${escapeHtml(nc.image)}"/>`:icon('camera')}</div><span style="font-size:12px;color:var(--ink-soft)">Tap to upload the category photo.</span></div></div>
    <div style="display:flex;gap:8px"><button class="btn-primary" style="flex:1" onclick="adminCatSave()">${icon('check')} Save</button><button class="btn-outline" style="flex:1" onclick="store.admin.catAdding=false;render()">Cancel</button></div></div>`;
}
async function adminCatSave(){ const nc=store.admin.newCat; if(!nc.name.trim()){ toast("Enter a name"); return; }
  try{ await sbRpc("rw_add_category",{p_passcode:store.admin.pass,p:{name:nc.name.trim(),icon:"box",image_url:nc.image||""}}); await reloadCategories(); store.admin.catAdding=false; toast("Category added"); render(); }
  catch(e){ toast(adminErr(e)); adminMaybeLogout(e); }
}
/* ----- Category editor (photo + sub-categories) ----- */
function adminOpenCategory(id){ store.admin.catEditId=id; store.admin.newSub={name:"",image:""}; window.scrollTo(0,0); render(); }
function adminCategoryEditor(){
  const c=store.categories.find(x=>x.id===store.admin.catEditId); if(!c){ store.admin.catEditId=null; return viewAdmin(); }
  const subs=subsForCat(c.id), cnt=store.products.filter(p=>p.cat===c.id).length, ns=store.admin.newSub;
  return `<div class="admin-wrap">
    <div class="back-bar" style="justify-content:space-between"><a class="back-btn" onclick="store.admin.catEditId=null;render()">${icon('back')} Categories</a><button class="back-btn" style="color:var(--danger)" onclick='adminDeleteCategory("${c.id}",${JSON.stringify(c.name)},${cnt})'>${icon('trash')} Delete</button></div>
    <div class="page-h">Edit Category</div>
    <div class="fld"><label>${icon('camera')} Category photo</label><div style="display:flex;gap:12px;align-items:center"><div class="photo-tile" onclick="pickCatImage('${c.id}')">${c.image_url?`<img src="${escapeHtml(c.image_url)}"/>`:icon('camera')}</div><span style="font-size:12px;color:var(--ink-soft)">Tap to change. Square photos look best.</span></div></div>
    <div class="fld"><label>${icon('tag')} Name</label><div style="display:flex;gap:8px"><input id="cat_name" style="flex:1;padding:13px;border:1px solid var(--line-dark);border-radius:10px;font-size:16px" value="${escapeHtml(c.name)}"/><button class="btn-primary" style="width:auto;padding:0 18px" onclick="adminSaveCatName('${c.id}')">${icon('check')}</button></div></div>
    <div class="page-h" style="font-size:16px;margin-top:16px">Sub-categories</div>
    ${subs.map(s=>`<div class="cat-manage-row"><div class="ci">${s.image_url?`<img src="${escapeHtml(s.image_url)}"/>`:icon(c.icon)}</div><div class="nm">${escapeHtml(s.name)}<div class="cnt">${store.products.filter(p=>p.cat===c.id&&p.subcategory===s.name).length} products</div></div><button class="del" title="Photo" onclick="pickSubImage('${s.id}')">${icon('camera')}</button><button class="del" onclick='adminDeleteSub("${s.id}",${JSON.stringify(s.name)})'>${icon('trash')}</button></div>`).join("")||`<p style="font-size:13px;color:var(--ink-soft)">No sub-categories yet.</p>`}
    <div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:12px">
      <label style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:10px">${icon('plus')} Add sub-category</label>

      <input id="sub_name" style="flex:1;padding:12px;border:1px solid var(--line-dark);border-radius:10px;font-size:15px" value="${escapeHtml(ns.name)}" oninput="store.admin.newSub.name=this.value" placeholder="e.g. Diamond Rumali"/></div>
      <button class="btn-primary" onclick="adminAddSub('${c.id}')">${icon('check')} Add sub-category</button></div>
    <div style="height:40px"></div></div>`;
}
async function adminSaveCatName(id){ const v=(document.getElementById('cat_name')||{}).value||""; if(!v.trim()){toast("Enter a name");return;} try{ await sbRpc("rw_update_category",{p_passcode:store.admin.pass,p_id:id,p:{name:v.trim()}}); await reloadCategories(); toast("Saved"); render(); }catch(e){ toast(adminErr(e)); adminMaybeLogout(e);} }
async function adminAddSub(catId){ const ns=store.admin.newSub; if(!ns.name.trim()){toast("Enter a name");return;} try{ await sbRpc("rw_add_subcategory",{p_passcode:store.admin.pass,p:{category_id:catId,name:ns.name.trim(),image_url:ns.image||""}}); await reloadSubcategories(); store.admin.newSub={name:"",image:""}; toast("Added"); render(); }catch(e){ toast(adminErr(e)); adminMaybeLogout(e);} }
async function adminDeleteSub(id,name){ if(!confirm(`Delete "${name}"?`))return; try{ await sbRpc("rw_delete_subcategory",{p_passcode:store.admin.pass,p_id:id}); await reloadSubcategories(); toast("Deleted"); render(); }catch(e){ toast(adminErr(e)); adminMaybeLogout(e);} }
function pickNewSubImage(){ const inp=document.getElementById("fileInput"); inp.value=""; inp.multiple=false; inp.onchange=async()=>{ const f=(inp.files||[])[0]; if(!f)return; toast("Uploading..."); try{ store.admin.newSub.image=await uploadOne(f); render(); }catch(e){ toast("Upload failed"); } }; inp.click(); }
function pickSubImage(subId){ const inp=document.getElementById("fileInput"); inp.value=""; inp.multiple=false; inp.onchange=async()=>{ const f=(inp.files||[])[0]; if(!f)return; toast("Uploading..."); try{ const url=await uploadOne(f); await sbRpc("rw_update_subcategory",{p_passcode:store.admin.pass,p_id:subId,p:{image_url:url}}); await reloadSubcategories(); toast("Photo updated"); render(); }catch(e){ toast(adminErr(e)); adminMaybeLogout(e);} }; inp.click(); }
async function adminDeleteCategory(id,name,cnt){ if(cnt>0){ toast(`Move/delete ${cnt} product(s) first`); return; } if(!confirm(`Delete "${name}"?`)) return;
  try{ await sbRpc("rw_delete_category",{p_passcode:store.admin.pass,p_id:id}); await reloadCategories(); toast("Deleted"); render(); }
  catch(e){ toast(/has_products/.test(e.message)?"Category has products":adminErr(e)); adminMaybeLogout(e); }
}
function adminLogin(){ return `<div class="admin-login"><div class="lk">${icon('lock')}</div><h2 style="font-size:22px">Admin</h2><p style="color:var(--ink-soft);font-size:13px;margin:4px 0 16px">Enter passcode.</p><div class="field" style="text-align:left"><input id="adm_pass" type="password" placeholder="Passcode" onkeydown="if(event.key==='Enter')adminVerify()"/></div><div style="height:12px"></div><button class="btn-primary" onclick="adminVerify()">${icon('check')} Unlock</button><div style="height:10px"></div><button class="btn-outline" onclick="go('home')">Back</button></div>`; }
async function adminVerify(){ const pass=(document.getElementById("adm_pass")||{}).value||""; if(!pass) return;
  try{ const ok=await sbRpc("rw_check_pass",{p_passcode:pass}); if(ok===true){ store.admin.pass=pass; sessionStorage.setItem("rw_pass",pass); toast("Welcome"); render(); } else toast("Wrong passcode"); }
  catch(e){ toast("Check connection"); }
}
function adminLogout(){ store.admin.pass=null; sessionStorage.removeItem("rw_pass"); go("home"); }
function adminErr(e){ return /unauthorized/i.test(e.message)?"Session expired - unlock again":"Something went wrong"; }
function adminMaybeLogout(e){ if(/unauthorized/i.test(e.message)){ store.admin.pass=null; sessionStorage.removeItem("rw_pass"); render(); } }

/* ----- Image upload from gallery ----- */
async function uploadOne(file){ const b64=await fileToB64(file); const r=await fetch(UPLOAD_FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({passcode:store.admin.pass,dataBase64:b64,contentType:file.type,filename:file.name})}); const j=await r.json(); if(!j.url) throw new Error(j.error||"upload"); return j.url; }
function pickImages(){ const inp=document.getElementById("fileInput"); inp.value=""; inp.multiple=true; inp.onchange=async()=>{ const files=[...(inp.files||[])]; if(!files.length) return; store.admin.uploading=true; render();
  for(const file of files){ try{ store.admin.form.images.push(await uploadOne(file)); }catch(e){ toast(/too_large/.test(e.message)?"Image too large":"Upload failed"); } }
  store.admin.uploading=false; render(); }; inp.click();
}
function pickCatImage(catId){ const inp=document.getElementById("fileInput"); inp.value=""; inp.multiple=false; inp.onchange=async()=>{ const f=(inp.files||[])[0]; if(!f) return; toast("Uploading..."); try{ const url=await uploadOne(f); await sbRpc("rw_update_category",{p_passcode:store.admin.pass,p_id:catId,p:{image_url:url}}); await reloadCategories(); toast("Image updated"); render(); }catch(e){ toast(/too_large/.test(e.message)?"Image too large":adminErr(e)); adminMaybeLogout(e); } }; inp.click(); }
function pickNewCatImage(){ const inp=document.getElementById("fileInput"); inp.value=""; inp.multiple=false; inp.onchange=async()=>{ const f=(inp.files||[])[0]; if(!f) return; toast("Uploading..."); try{ store.admin.newCat.image=await uploadOne(f); render(); }catch(e){ toast(/too_large/.test(e.message)?"Image too large":"Upload failed"); } }; inp.click(); }
function fileToB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(",")[1]); r.onerror=rej; r.readAsDataURL(file); }); }
function afRemoveImg(i){ store.admin.form.images.splice(i,1); render(); }

/* ----- Product wizard (step-by-step) ----- */
function blankForm(){ return { id:null, title:"", cat:(store.categories[0]||{}).id||"rumali", sub:"", age:"", sizes:[], fabric:"", price:"", mrp:"", stock:"10", colors:[], images:[], desc:"", active:true }; }
function adminNewProduct(){ store.admin.editing=null; store.admin.form=blankForm(); store.admin.step=0; render(); pickImages(); }
function adminEditProduct(id){ const p=byId(id); if(!p) return; store.admin.editing=id; store.admin.form={ id:p.id, title:p.title, cat:p.cat, sub:p.sub, age:p.age, sizes:(p.sizes&&p.sizes.length)?[...p.sizes]:(p.age?[p.age]:[]), fabric:p.fabric, price:String(p.price), mrp:p.mrp?String(p.mrp):"", stock:String(p.stock), colors:[...(p.colors||[])], images:[...(p.images||(p.image?[p.image]:[]))], desc:p.desc, active:p.active }; store.admin.step=0; render(); }
function afSet(k,v){ store.admin.form[k]=v; render(); }
function afInput(k,v){ store.admin.form[k]=v; }
function afToggle(k,v){ const a=store.admin.form[k]; const i=a.indexOf(v); if(i>=0) a.splice(i,1); else a.push(v); render(); }
function wizStep(d){ const f=store.admin.form; if(d>0){ if(store.admin.step===0 && !f.title.trim()){ toast("Enter product name"); return; } if(store.admin.step===1 && (f.price===""||isNaN(+f.price))){ toast("Enter a price"); return; } } store.admin.step=Math.max(0,Math.min(2,store.admin.step+d)); window.scrollTo(0,0); render(); }
function afSetCat(id){ store.admin.form.cat=id; const subs=subsForCat(id).map(s=>s.name); if(!subs.includes(store.admin.form.sub)) store.admin.form.sub=""; render(); }
function adminFormView(){ const f=store.admin.form, isNew=!store.admin.editing, step=store.admin.step;
  const stepsBar=`<div class="wiz-steps">${[0,1,2].map(i=>`<div class="s ${i<=step?'on':''}"></div>`).join("")}</div>`;
  const head=`<div class="back-bar" style="justify-content:space-between"><a class="back-btn" onclick="adminGo('products')">${icon('back')} Products</a><button class="back-btn" onclick="adminGo('products')">${icon('x')} Close</button></div><div class="page-h">${isNew?'Add Product':'Edit Product'} <span style="font-size:14px;color:var(--ink-soft)">· ${step+1}/3</span></div>${stepsBar}`;
  let body="";
  if(step===0){ const subs=subsForCat(f.cat);
    body=`<div class="fld"><label>${icon('camera')} Photos</label>
      <div class="photo-tiles">${f.images.map((u,i)=>`<div class="pt"><img src="${escapeHtml(u)}"/><button class="rm" onclick="afRemoveImg(${i})">${icon('x')}</button></div>`).join("")}
      <button class="photo-add" onclick="pickImages()" ${store.admin.uploading?'disabled':''}>${store.admin.uploading?'...':icon('upload')}${store.admin.uploading?'':'<span>Gallery</span>'}</button></div>
      <p style="font-size:12px;color:var(--ink-soft);margin-top:6px">Pick photos from your phone. First is the main image.</p></div>
      <div class="fld"><label>${icon('tag')} Product name</label><input style="width:100%;padding:14px;border:1px solid var(--line-dark);border-radius:10px;font-size:17px;font-weight:600" value="${escapeHtml(f.title)}" oninput="afInput('title',this.value)" onchange="render()" placeholder="e.g. Diamond Net Rumali"/></div>
      <div class="fld"><label>${icon('layers')} Category</label><div class="chip-wrap">${store.categories.map(c=>`<button class="chip chip-ic ${f.cat===c.id?'on':''}" onclick="afSetCat('${c.id}')">${icon(c.icon)} ${escapeHtml(c.name)}</button>`).join("")}</div></div>
      <div class="fld"><label>${icon('box')} Sub-category</label>${subs.length?`<div class="chip-wrap">${subs.map(s=>`<button class="chip ${f.sub===s.name?'on':''}" onclick="afSet('sub',${JSON.stringify(f.sub===s.name?'':s.name)})">${escapeHtml(s.name)}</button>`).join("")}</div>`:`<p style="font-size:12px;color:var(--ink-soft)">No sub-categories for this category yet. Add them in the Categories tab.</p>`}</div>
      <div class="fld"><label>${icon('rumali')} Size / Age (choose one or more)</label><div class="chip-wrap">${SIZE_CHOICES.map(s=>`<button class="chip ${f.sizes.includes(s)?'on':''}" onclick="afToggle('sizes',${JSON.stringify(s)})">${escapeHtml(s.replace(' Years','y'))}</button>`).join("")}</div><p style="font-size:12px;color:var(--ink-soft);margin-top:6px">Shown as age/size to customers. Pick many, or leave empty for one-size.</p></div>
      <div class="fld"><label>${icon('spark')} Colours</label><div class="swatch-wrap">${PALETTE.map(c=>`<div class="swatch ${f.colors.includes(c.h)?'on':''}" style="background:${c.h}" title="${c.n}" onclick="afToggle('colors','${c.h}')">${f.colors.includes(c.h)?`<span class="tick">${icon('check')}</span>`:''}</div>`).join("")}</div></div>`;
  } else if(step===1){ body=`<div class="form-grid">
      <div class="field"><label>${icon('rupee')} Price</label><input inputmode="numeric" value="${escapeHtml(f.price)}" oninput="afInput('price',this.value)" placeholder="120"/></div>
      <div class="field"><label>MRP</label><input inputmode="numeric" value="${escapeHtml(f.mrp)}" oninput="afInput('mrp',this.value)" placeholder="150"/></div>
      <div class="field"><label>${icon('box')} Stock</label><input inputmode="numeric" value="${escapeHtml(f.stock)}" oninput="afInput('stock',this.value)" placeholder="10"/></div>
      <div class="field"><label>Fabric</label><input value="${escapeHtml(f.fabric)}" oninput="afInput('fabric',this.value)" placeholder="Cotton"/></div>
      <div class="field full"><label>Description (optional)</label><textarea style="min-height:64px" oninput="afInput('desc',this.value)">${escapeHtml(f.desc)}</textarea></div></div>
      <div class="fld" style="margin-top:12px"><label>${icon('eye')} Show in store</label><div class="toggle-row"><button class="chip ${f.active?'on':''}" onclick="afSet('active',true)">${icon('check')} Show</button><button class="chip ${!f.active?'on':''}" onclick="afSet('active',false)">${icon('eyeoff')} Hide</button></div></div>`;
  } else { const prev={...f,price:+f.price||0,mrp:+f.mrp||0,stars:5,stock:+f.stock||0,age:(f.sizes&&f.sizes[0])||""}; body=`<div class="fld"><label>${icon('eye')} Preview</label><div style="max-width:180px">${productCardStatic(prev)}</div></div>
      <p style="font-size:13px;color:var(--ink-soft)">Check everything looks right, then save.</p>`;
  }
  const nav=`<div class="wiz-nav">${step>0?`<button class="btn-outline" onclick="wizStep(-1)">${icon('back')} Back</button>`:''}${step<2?`<button class="btn-primary" onclick="wizStep(1)">Next ${icon('arrow')}</button>`:`<button class="btn-primary" id="a_save" onclick="adminSaveProduct()">${icon('check')} ${isNew?'Add Product':'Save'}</button>`}</div>`;
  const delBtn=(!isNew&&step===2)?`<div style="height:10px"></div><button class="btn-primary btn-danger" onclick='adminDeleteProduct("${f.id}",${JSON.stringify(f.title)})'>${icon('trash')} Delete</button>`:'';
  return `<div class="admin-wrap">${head}${body}${nav}${delBtn}<div style="height:30px"></div></div>`;
}
function productCardStatic(p){ return `<div class="prod-card"><div class="prod-thumb">${thumbHTML(p)}</div><div class="prod-body"><div class="prod-title">${escapeHtml(p.title||'Product name')}</div>${p.age?`<div class="prod-meta">${p.age}</div>`:''}<div class="prod-price-row"><span class="prod-price">${money(p.price)}</span>${p.mrp>p.price?`<span class="prod-mrp">${money(p.mrp)}</span>`:''}</div></div></div>`; }
async function adminSaveProduct(){ const f=store.admin.form;
  if(!f.title.trim()){ toast("Enter product name"); store.admin.step=0; render(); return; }
  if(f.price===""||isNaN(+f.price)){ toast("Enter a price"); store.admin.step=1; render(); return; }
  const data={ category:f.cat, subcategory:(f.sub||"").trim(), age:(f.sizes&&f.sizes[0])||"", title:f.title.trim(), description:(f.desc||"").trim(), price:+f.price, mrp:+(f.mrp||0), fabric:(f.fabric||"").trim(), colors:f.colors, sizes:f.sizes, images:f.images, image_url:f.images[0]||"", stock:+(f.stock||0), active:!!f.active };
  const btn=document.getElementById("a_save"); if(btn){ btn.disabled=true; btn.textContent="Saving..."; }
  try{ if(store.admin.editing) await sbRpc("rw_update_product",{p_passcode:store.admin.pass,p_id:store.admin.editing,p:data}); else await sbRpc("rw_add_product",{p_passcode:store.admin.pass,p:data});
    await reloadProducts(); store.admin.form=null; toast(store.admin.editing?"Saved":"Product added"); render();
  }catch(e){ if(btn){btn.disabled=false;} toast(adminErr(e)); adminMaybeLogout(e); }
}
async function adminDeleteProduct(id,title){ if(!confirm(`Delete "${title}"?`)) return;
  try{ await sbRpc("rw_delete_product",{p_passcode:store.admin.pass,p_id:id}); await reloadProducts(); store.admin.form=null; toast("Deleted"); render(); }
  catch(e){ toast(adminErr(e)); adminMaybeLogout(e); }
}

/* ----- Bulk add ----- */
function adminBulkStart(){ store.admin.bulk=true; store.admin.bulkText=""; render(); }
function adminBulkView(){
  return `<div class="admin-wrap"><div class="back-bar"><a class="back-btn" onclick="store.admin.bulk=false;render()">${icon('back')} Admin</a></div>
    <div class="page-h">Bulk Add Products</div>
    <p style="font-size:13px;color:var(--ink-soft);margin:0 0 12px">One product per line. Separate fields with a comma:<br/><b>Name, Category, Price, MRP, Stock</b><br/>Category can be a name (Rumali) or blank for the first category.</p>
    <textarea id="bulkText" style="width:100%;min-height:180px;padding:13px;border:1px solid var(--line-dark);border-radius:10px;font-size:14px;font-family:monospace" placeholder="Diamond Rumali, Rumali, 120, 150, 20&#10;Cotton Cap, Cap, 60, 80, 40" oninput="store.admin.bulkText=this.value">${escapeHtml(store.admin.bulkText)}</textarea>
    <p id="bulkCount" style="font-size:13px;color:var(--accent-2);margin:8px 2px">${bulkParse(store.admin.bulkText).length} product(s) detected</p>
    <button class="btn-primary" id="bulk_save" onclick="adminBulkSave()">${icon('check')} Add all</button>
    <div style="height:10px"></div><button class="btn-outline" onclick="store.admin.bulk=false;render()">Cancel</button><div style="height:30px"></div></div>`;
}
function bulkParse(text){ const out=[]; (text||"").split(/\r?\n/).forEach(line=>{ if(!line.trim()) return; const parts=line.split(/[,\t]/).map(s=>s.trim());
  const title=parts[0]; if(!title) return; const catRaw=parts[1]||""; const cat=store.categories.find(c=>c.id===catRaw.toLowerCase()||c.name.toLowerCase()===catRaw.toLowerCase()); const catId=cat?cat.id:((store.categories[0]||{}).id||"rumali");
  const price=+(parts[2]||0)||0, mrp=+(parts[3]||0)||0, stock=parts[4]!==undefined&&parts[4]!==""?+parts[4]:10;
  out.push({ category:catId, title, price, mrp, stock, active:true }); }); return out; }
async function adminBulkSave(){ const items=bulkParse(store.admin.bulkText); if(!items.length){ toast("Nothing to add"); return; }
  const btn=document.getElementById("bulk_save"); if(btn){ btn.disabled=true; btn.textContent="Adding..."; }
  try{ const n=await sbRpc("rw_add_products",{p_passcode:store.admin.pass,items}); await reloadProducts(); store.admin.bulk=false; toast(`Added ${n} product(s)`); render(); }
  catch(e){ if(btn){btn.disabled=false;} toast(adminErr(e)); adminMaybeLogout(e); }
}

/* ============ CHROME / INIT ============ */
function updateBadges(){ renderNav(); }
function renderNav(){
  const nav=document.getElementById("bottomNav"); if(!nav) return;
  if(store.view==="admin" && store.admin.pass){
    const sub=store.admin.form||store.admin.bulk||store.admin.catEditId;
    const items=[["dashboard","gauge","Dashboard"],["products","box","Products"],["categories","layers","Categories"],["orders","receipt","Orders"]];
    nav.innerHTML=items.map(([tab,ic,label])=>`<button class="${!sub&&store.admin.tab===tab?'active':''}" onclick="adminGo('${tab}')">${icon(ic)}<span>${label}</span></button>`).join("");
  } else {
    const c=cartCount();
    const items=[["home","home",t('nav_home'),"go('home')"],["categories","grid",t('nav_shop'),"go('categories')"],["wishlist","heart",t('nav_saved'),"go('wishlist')"],["cart","cart",t('nav_cart'),"go('cart')"]];
    nav.innerHTML=items.map(([v,ic,label,fn])=>`<button class="${store.view===v?'active':''}" onclick="${fn}">${icon(ic)}<span>${label}</span>${v==='cart'&&c?`<span class="nav-badge">${c}</span>`:''}</button>`).join("");
  }
}
function applyChrome(){
  const ab=document.getElementById("announceBar"); if(ab) ab.innerHTML=`${icon('spark')} ${t('free_delivery')}`;
  document.getElementById("brandMark").innerHTML='R';
  document.getElementById("brandTag").textContent=t('tag');
  document.getElementById("langBtn").innerHTML=icon('globe')+`<span>${LANG_LABEL[LANG]}</span>`;
  renderNav();
  const wa=document.getElementById("fabWa"); wa.innerHTML=icon('whatsapp'); wa.href=`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent('Assalamualaikum')}`; wa.target="_blank";
  const call=document.getElementById("fabCall"); call.innerHTML=icon('phone'); call.href=`tel:+${CONFIG.callNumber}`;
}
async function init(){ document.documentElement.lang=LANG; applyChrome(); if(location.hostname.startsWith("admin.")||location.hash==="#admin") store.view="admin"; render(); await loadData(); render(); }
init();
</script>
